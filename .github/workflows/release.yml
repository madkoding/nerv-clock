name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update version in files (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          
          # Update package.json
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' package.json
          
          # Update tauri.conf.json
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          
          # Update Cargo.toml (only the package version, not dependencies)
          sed -i.bak '0,/^version = "[^"]*"/s//version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          
          # Clean up backup files
          rm -f package.json.bak src-tauri/tauri.conf.json.bak src-tauri/Cargo.toml.bak
          
          echo "Updated versions to $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        run: npm run build

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          retention-days: 1
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;35.0.0" "platforms;android-35"
          # Fallback to 34 if 35 not available
          sdkmanager "build-tools;34.0.0" "platforms;android-34" || true

      - name: Build Android APK
        run: |
          REPO_ROOT="${GITHUB_WORKSPACE}"
          ANDROID_DIR="$REPO_ROOT/android"
          UI_DIR="$REPO_ROOT/ui"
          
          cd "$ANDROID_DIR"
          
          # Try SDK 35 first, fallback to 34
          if [ -d "$ANDROID_HOME/build-tools/35.0.0" ]; then
            export BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
            export PLATFORM="$ANDROID_HOME/platforms/android-35"
          else
            export BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
            export PLATFORM="$ANDROID_HOME/platforms/android-34"
          fi
          
          echo "Using BUILD_TOOLS: $BUILD_TOOLS"
          echo "Using PLATFORM: $PLATFORM"
          
          BUILD_DIR="$ANDROID_DIR/build"
          GEN_DIR="$BUILD_DIR/gen"
          OBJ_DIR="$BUILD_DIR/obj"
          BIN_DIR="$BUILD_DIR/bin"
          CLASSES_DIR="$BUILD_DIR/classes"
          
          rm -rf "$BUILD_DIR"
          mkdir -p "$GEN_DIR" "$OBJ_DIR" "$BIN_DIR" "$CLASSES_DIR"
          
          echo "📦 Compiling resources..."
          "$BUILD_TOOLS/aapt2" compile --dir app/src/main/res -o "$OBJ_DIR/resources.zip"
          
          echo "📦 Linking resources..."
          "$BUILD_TOOLS/aapt2" link \
              "$OBJ_DIR/resources.zip" \
              -I "$PLATFORM/android.jar" \
              --manifest app/src/main/AndroidManifest.xml \
              --java "$GEN_DIR" \
              -o "$OBJ_DIR/app.apk.unaligned" \
              --auto-add-overlay
          
          echo "☕ Compiling Java..."
          find app/src/main/java -name "*.java" > "$BUILD_DIR/sources.txt"
          echo "$GEN_DIR/com/nerv/clock/R.java" >> "$BUILD_DIR/sources.txt"
          
          javac -source 1.8 -target 1.8 \
              -bootclasspath "$PLATFORM/android.jar" \
              -classpath "$PLATFORM/android.jar" \
              -d "$CLASSES_DIR" \
              @"$BUILD_DIR/sources.txt"
          
          echo "📱 Creating DEX..."
          find "$CLASSES_DIR" -name "*.class" > "$BUILD_DIR/classes.txt"
          "$BUILD_TOOLS/d8" --output "$OBJ_DIR" $(cat "$BUILD_DIR/classes.txt")
          
          echo "📦 Creating APK..."
          cp "$OBJ_DIR/app.apk.unaligned" "$OBJ_DIR/app.apk.tmp"
          zip -j "$OBJ_DIR/app.apk.tmp" "$OBJ_DIR/classes.dex"
          
          ASSETS_DIR="$ANDROID_DIR/app/src/main/assets"
          rm -rf "$ASSETS_DIR"
          mkdir -p "$ASSETS_DIR/fonts"
          cp "$UI_DIR/index.html" "$ASSETS_DIR/widget.html"
          sed -i 's/width=device-width/width=400/g' "$ASSETS_DIR/widget.html"
          cp "$UI_DIR/style.css" "$ASSETS_DIR/"
          # Fix CSS units for Android WebView (cqw not supported, use vw instead)
          sed -i 's/cqw/vw/g' "$ASSETS_DIR/style.css"
          sed -i 's/cqh/vh/g' "$ASSETS_DIR/style.css"
          # Remove container queries completely (not supported in Android WebView)
          sed -i 's/container-type: size;//g' "$ASSETS_DIR/style.css"
          sed -i 's/container-name: clock;//g' "$ASSETS_DIR/style.css"
          # Remove @container blocks entirely (they cause parsing errors in old WebViews)
          sed -i '/@container/,/^}/d' "$ASSETS_DIR/style.css"
          # Update font sizes for Android widget
          sed -i '0,/font-size: 12vw/{s/font-size: 12vw/font-size: 13vw/}' "$ASSETS_DIR/style.css"
          sed -i 's/font-size: 9vw/font-size: 13vw/g' "$ASSETS_DIR/style.css"
          sed -i 's/font-size: 6vw/font-size: 8vw/g' "$ASSETS_DIR/style.css"
          sed -i 's/font-size: 8vw/font-size: 10vw/g' "$ASSETS_DIR/style.css"
          cp "$UI_DIR/clock.js" "$ASSETS_DIR/"
          cp "$UI_DIR/fonts/dseg7.ttf" "$ASSETS_DIR/fonts/" 2>/dev/null || true
          cp "$UI_DIR/fonts/dseg7.woff" "$ASSETS_DIR/fonts/" 2>/dev/null || true
          cp "$UI_DIR/fonts/NimbusSans-Regular.otf" "$ASSETS_DIR/fonts/" 2>/dev/null || true
          cp "$UI_DIR/fonts/NimbusSans-Bold.otf" "$ASSETS_DIR/fonts/" 2>/dev/null || true
          
          cd "$ANDROID_DIR/app/src/main"
          zip -r "$OBJ_DIR/app.apk.tmp" assets/
          cd "$ANDROID_DIR"
          
          echo "✍️ Aligning APK..."
          "$BUILD_TOOLS/zipalign" -f 4 "$OBJ_DIR/app.apk.tmp" "$OBJ_DIR/app.apk.aligned"
          
          echo "🔑 Generating keystore..."
          keytool -genkey -v \
              -keystore release.keystore \
              -alias nerv \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=NERV, OU=MAGI, O=NERV, L=Tokyo-3, ST=Japan, C=JP"
          
          echo "✍️ Signing APK..."
          "$BUILD_TOOLS/apksigner" sign \
              --ks release.keystore \
              --ks-pass pass:android \
              --key-pass pass:android \
              --out "$BIN_DIR/NervClock.apk" \
              "$OBJ_DIR/app.apk.aligned"
          
          echo "✅ APK built: $BIN_DIR/NervClock.apk"

      - name: Upload Android APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          retention-days: 1
          path: android/build/bin/NervClock.apk

  publish-release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.apk" \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate changelog
        id: changelog
        run: |
          # Get current and previous tag
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "$CURRENT_TAG" | head -1)
          
          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $PREVIOUS_TAG"
          
          # Start changelog with header
          cat > changelog.md << 'EOF'
          ## 🎌 NERV Clock Release
          
          Evangelion-style clock widget for desktop and Android.
          
          ### 📥 Downloads
          - **Android**: `NervClock.apk`
          - **Linux**: `.AppImage`, `.deb`, `.rpm`
          - **Windows**: `.exe`, `.msi`
          - **macOS**: `.dmg`
          
          ### ✨ Features
          - NERV/Evangelion aesthetic
          - Pomodoro timer (NORMAL 5min, SLOW 25min)
          - Color warnings (yellow at 4min, red at 1min)
          - Desktop: transparent, always-on-top, draggable
          - Android: home screen widget
          
          EOF
          
          # Generate changes section
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### 📋 Changes since $PREVIOUS_TAG" >> changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" >> changelog.md
          else
            echo "### 📋 Initial Release" >> changelog.md
            echo "" >> changelog.md
            echo "- First public release" >> changelog.md
          fi
          
          echo "" >> changelog.md
          cat changelog.md

      - name: Create release in public repo
        uses: softprops/action-gh-release@v1
        with:
          repository: madkoding/nerv-clock-releases
          tag_name: ${{ github.ref_name }}
          name: 'NERV Clock ${{ github.ref_name }}'
          body_path: changelog.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
