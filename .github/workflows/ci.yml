name: CI - Test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  test-javascript:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: javascript

  test-rust:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Run cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run cargo llvm-cov
        run: cargo llvm-cov --lcov --output-path lcov.info
        working-directory: src-tauri

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src-tauri/lcov.info
          flags: rust

  build-android-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" 2>/dev/null || true
          sdkmanager "platforms;android-30" "build-tools;30.0.3" 2>/dev/null || true

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "Build tools:"
          ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "No build-tools"
          echo "Platforms:"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms"

      - name: Verify Android build
        run: |
          cd android
          chmod +x build.sh
          ./build.sh
